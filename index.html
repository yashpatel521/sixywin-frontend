<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo/logo3.png" />
    <link rel="apple-touch-icon" href="/logo/logo3.png" />
    <link rel="shortcut icon" href="/logo/logo3.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google AdSense with Consent Mode -->
    <script>
      // Initialize Google Consent Mode
      window.gtag =
        window.gtag ||
        function () {
          (gtag.q = gtag.q || []).push(arguments);
        };
      gtag("consent", "default", {
        ad_storage: "denied",
        ad_user_data: "denied",
        ad_personalization: "denied",
        analytics_storage: "denied",
      });

      // Global error handler to prevent external script errors
      window.addEventListener("error", function (event) {
        // Check if error is from external scripts we don't control
        if (event.filename && event.filename.includes("share-modal")) {
          console.warn(
            "External script error caught and ignored:",
            event.message
          );
          event.preventDefault();
          return true;
        }
      });

      // Handle unhandled promise rejections from external scripts
      window.addEventListener("unhandledrejection", function (event) {
        if (
          event.reason &&
          typeof event.reason === "string" &&
          event.reason.includes("share-modal")
        ) {
          console.warn(
            "External script promise rejection caught and ignored:",
            event.reason
          );
          event.preventDefault();
        }
      });
    </script>
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2204167319440199"
      crossorigin="anonymous"
    ></script>
